syntax = "proto3";

package dating.im.v1;

option java_multiple_files = true;
option java_package = "com.dating.hanlian.proto.im.v1";
option java_outer_classname = "ImProto";

service ImService {
  rpc Ping (PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}
